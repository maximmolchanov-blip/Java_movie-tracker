<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 40px;
            border-bottom: 1px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e9456040;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem;
            color: #e94560;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"], select {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"] { width: 280px; }

        input[type="text"]:focus, select:focus {
            border-color: #e94560;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover { background: #c73652; transform: translateY(-1px); }

        .btn-secondary {
            background: #1a1a2e;
            color: #e0e0e0;
            border: 1px solid #333;
        }

        .btn-secondary:hover { border-color: #e94560; color: #e94560; }

        .btn-import {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #1a5490;
        }

        .btn-import:hover { background: #1a5490; }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #222;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }

        .movie-poster {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #0f0f1a;
        }

        .movie-poster-placeholder {
            width: 100%;
            height: 280px;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }

        .rating {
            color: #f39c12;
            font-weight: 600;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 6px;
            display: inline-block;
        }

        .status-WATCHED { background: #27ae6030; color: #27ae60; }
        .status-WATCHING { background: #3498db30; color: #3498db; }
        .status-WANT_TO_WATCH { background: #e94560 20; color: #e94560; }
        .status-DROPPED { background: #e74c3c20; color: #e74c3c; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }

        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h2 { font-size: 1.5rem; margin-bottom: 10px; }

        .success-msg {
            background: #27ae6020;
            border: 1px solid #27ae60;
            color: #27ae60;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filter-section {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-label {
            color: #888;
            font-size: 0.85rem;
        }

        form { display: inline; }
    </style>
</head>
<body>

<header>
    <div class="logo">🎬 Movie Tracker</div>
    <div class="stats-bar">
        <span class="stat-chip">📽️ Всього: <span th:text="${stats['total']}">0</span></span>
        <span class="stat-chip">✅ Переглянуто: <span th:text="${stats['watched']}">0</span></span>
        <span class="stat-chip">▶️ Дивлюсь: <span th:text="${stats['watching']}">0</span></span>
        <span class="stat-chip">🔖 Хочу: <span th:text="${stats['wantToWatch']}">0</span></span>
    </div>
</header>

<div class="container">

    <!-- Success message -->
    <div class="success-msg" th:if="${success}" th:text="${success}"></div>

    <!-- Controls -->
    <div class="controls">
        <!-- Search -->
        <form action="/" method="get">
            <input type="text" name="search" placeholder="🔍 Пошук фільму..."
                   th:value="${currentSearch}"/>
            <button type="submit" class="btn btn-primary">Знайти</button>
        </form>

        <a href="/" class="btn btn-secondary">Всі фільми</a>

        <!-- Import buttons -->
        <button class="btn btn-import" onclick="importMovies('popular')">⬇️ Популярні з TMDB</button>
        <button class="btn btn-import" onclick="importMovies('top-rated')">⭐ Топ-рейтинг з TMDB</button>
    </div>

    <!-- Filters -->
    <div class="controls">
        <span class="filter-label">Фільтр:</span>

        <div class="filter-section">
            <form action="/" method="get">
                <select name="status" onchange="this.form.submit()">
                    <option value="">-- Статус --</option>
                    <option th:each="s : ${statuses}"
                            th:value="${s.name()}"
                            th:text="${s.name()}"
                            th:selected="${s.name() == currentStatus}">
                    </option>
                </select>
            </form>

            <form action="/" method="get">
                <select name="genre" onchange="this.form.submit()">
                    <option value="">-- Жанр --</option>
                    <option th:each="g : ${genres}"
                            th:value="${g}"
                            th:text="${g}"
                            th:selected="${g == currentGenre}">
                    </option>
                </select>
            </form>
        </div>
    </div>

    <!-- Movie Grid -->
    <div class="movies-grid" th:if="${!movies.isEmpty()}">
        <a th:each="movie : ${movies}"
           th:href="@{/movies/{id}(id=${movie.id})}"
           class="movie-card">

            <img th:if="${movie.posterUrl != null and !movie.posterUrl.contains('no-poster')}"
                 th:src="${movie.posterUrl}"
                 th:alt="${movie.title}"
                 class="movie-poster"/>

            <div th:unless="${movie.posterUrl != null and !movie.posterUrl.contains('no-poster')}"
                 class="movie-poster-placeholder">🎬</div>

            <div class="movie-info">
                <div class="movie-title" th:text="${movie.title}">Title</div>
                <div class="movie-meta">
                    <span th:text="${movie.releaseYear}">2024</span>
                    <span class="rating" th:if="${movie.rating != null}">
                        ⭐ <span th:text="${#numbers.formatDecimal(movie.rating, 1, 1)}">0.0</span>
                    </span>
                </div>
                <span th:class="'status-badge status-' + ${movie.status}"
                      th:text="${movie.status}">Status</span>
            </div>
        </a>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${movies.isEmpty()}">
        <div class="icon">🎬</div>
        <h2>Фільмів не знайдено</h2>
        <p>Натисни "Популярні з TMDB" щоб завантажити фільми</p>
    </div>
</div>

<script>
    async function importMovies(type) {
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '⏳ Завантаження...';

        try {
            const res = await fetch(`/api/movies/import/${type}`, { method: 'POST' });
            const data = await res.json();

            if (res.ok) {
                alert(`✅ Імпортовано ${data.imported} нових фільмів!`);
                location.reload();
            } else {
                alert(`❌ Помилка: ${data.error}`);
                btn.disabled = false;
                btn.textContent = type === 'popular' ? '⬇️ Популярні з TMDB' : '⭐ Топ-рейтинг з TMDB';
            }
        } catch (e) {
            alert('❌ Помилка підключення до сервера');
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
