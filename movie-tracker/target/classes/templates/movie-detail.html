<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.title} + ' — Movie Tracker'">Movie Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 40px;
            border-bottom: 1px solid #e94560;
        }

        .back-link {
            color: #e94560;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
        }

        .back-link:hover { text-decoration: underline; }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 8px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .movie-detail {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .poster-section {
            position: relative;
        }

        .movie-poster {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .poster-placeholder {
            width: 100%;
            height: 450px;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .info-section {
            padding: 30px 30px 30px 0;
        }

        .movie-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .meta-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.95rem;
        }

        .rating { color: #f39c12; font-size: 1.1rem; font-weight: 700; }

        .genres {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .genre-tag {
            background: #e9456015;
            border: 1px solid #e9456040;
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .description {
            color: #bbb;
            line-height: 1.7;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .status-form {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }

        select {
            background: #0f0f1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        select:focus { border-color: #e94560; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; }

        .btn-danger { background: #e74c3c20; color: #e74c3c; border: 1px solid #e74c3c40; }
        .btn-danger:hover { background: #e74c3c; color: white; }

        .success-msg {
            background: #27ae6020;
            border: 1px solid #27ae60;
            color: #27ae60;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-WATCHED { background: #27ae6030; color: #27ae60; }
        .status-WATCHING { background: #3498db30; color: #3498db; }
        .status-WANT_TO_WATCH { background: #e9456020; color: #e94560; }
        .status-DROPPED { background: #e74c3c20; color: #e74c3c; }

        @media (max-width: 700px) {
            .movie-detail { grid-template-columns: 1fr; }
            .info-section { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🎬 Movie Tracker</div>
    <a href="/" class="back-link">← Назад до списку</a>
</header>

<div class="container">

    <div class="success-msg" th:if="${success}" th:text="${success}"></div>

    <div class="movie-detail">
        <div class="poster-section">
            <img th:if="${movie.posterUrl != null and !movie.posterUrl.contains('no-poster')}"
                 th:src="${movie.posterUrl}"
                 th:alt="${movie.title}"
                 class="movie-poster"/>
            <div th:unless="${movie.posterUrl != null}"
                 class="poster-placeholder">🎬</div>
        </div>

        <div class="info-section">
            <h1 class="movie-title" th:text="${movie.title}">Movie Title</h1>

            <div class="meta-row">
                <div class="meta-item" th:if="${movie.releaseYear != null}">
                    📅 <span th:text="${movie.releaseYear}">2024</span>
                </div>
                <div class="meta-item" th:if="${movie.rating != null}">
                    <span class="rating">⭐ <span th:text="${#numbers.formatDecimal(movie.rating, 1, 1)}">0.0</span></span>
                    <span>/ 10</span>
                </div>
            </div>

            <div class="genres" th:if="${!movie.genres.isEmpty()}">
                <span th:each="genre : ${movie.genres}"
                      th:text="${genre}"
                      class="genre-tag">Genre</span>
            </div>

            <p class="description"
               th:if="${movie.description != null and !movie.description.isEmpty()}"
               th:text="${movie.description}">Description...</p>

            <p class="description" th:if="${movie.description == null or movie.description.isEmpty()}">
                Опис відсутній.
            </p>

            <!-- Status -->
            <div class="section-title">Статус перегляду</div>

            <div>
                <span th:class="'status-badge status-' + ${movie.status}"
                      th:text="${movie.status}"
                      style="margin-bottom: 16px; display: inline-block;">Status</span>
            </div>

            <form th:action="@{/movies/{id}/status(id=${movie.id})}" method="post" class="status-form">
                <select name="status">
                    <option th:each="s : ${statuses}"
                            th:value="${s.name()}"
                            th:text="${s.name()}"
                            th:selected="${s.name() == movie.status}">
                    </option>
                </select>
                <button type="submit" class="btn btn-primary">Оновити</button>
            </form>

            <!-- Delete -->
            <form th:action="@{/movies/{id}/delete(id=${movie.id})}" method="post"
                  onsubmit="return confirm('Видалити цей фільм?')">
                <button type="submit" class="btn btn-danger">🗑️ Видалити</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
